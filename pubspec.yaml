name: musicapp
description: "Chuyassi - Music platform for African artists"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # HTTP & networking
  dio: ^5.4.3+1
  http: ^1.2.1

  # Audio player
  just_audio: ^0.9.39
  audio_service: ^0.18.13
  audio_session: ^0.1.21

  # Storage
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  cached_network_image: ^3.3.1
  video_player: ^2.9.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  percent_indicator: ^4.2.3
  badges: ^3.1.2
  fluttertoast: ^8.2.6

  # Permissions & connectivity
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

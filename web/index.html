<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chuyassi — African Music Platform. Stream, download, and support your favourite artists.">
  <meta name="keywords" content="music, African music, Cameroon, streaming, FCFA, Orange Money, MTN MoMo">
  <meta name="theme-color" content="#6C3FE8">

  <!-- Open Graph -->
  <meta property="og:title" content="Chuyassi — African Music Platform">
  <meta property="og:description" content="Stream, download and support African artists directly.">
  <meta property="og:type" content="website">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chuyassi">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Chuyassi — African Music</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background: #0D0D1A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeIn 0.8s ease;
    }
    #logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #6C3FE8, #FF6B35);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
    }
    #logo svg { width: 44px; height: 44px; fill: white; }
    #name { color: #fff; font-size: 32px; font-weight: 700; letter-spacing: 2px; }
    #sub { color: #B0B0CC; font-size: 13px; letter-spacing: 1px; }
    .dot-loader { display: flex; gap: 6px; margin-top: 32px; }
    .dot-loader span {
      width: 8px; height: 8px; border-radius: 50%;
      background: #6C3FE8; animation: bounce 1.2s infinite;
    }
    .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
    .dot-loader span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1.2); opacity: 1; }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="splash">
    <div id="logo">
      <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </div>
    <div id="name">Chuyassi</div>
    <div id="sub">AFRICAN MUSIC PLATFORM</div>
    <div class="dot-loader"><span></span><span></span><span></span></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
